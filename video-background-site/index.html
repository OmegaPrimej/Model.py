<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Background</title>
  <style>
    #bg-video {
      position: fixed;
      right: 0;
      bottom: 0;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      z-index: -1;
      object-fit: cover;
    }
    .content {
      position: relative;
      z-index: 1;
      color: white;
      text-align: center;
      margin-top: 20vh;
      font-family: sans-serif;
      text-shadow: 2px 2px 4px black;
    }
  </style>
</head>
<body>
  <video autoplay muted loop playsinline id="bg-video">
    <!-- Use your exact filename here -->
    <source src="1776001437650.mp4" type="video/mp4">
    Your browser does not support HTML5 video.
  </video>
  <div class="content">
    <h1>Hello World</h1>
    <p>This is a full‑screen video background.</p>
  </div>
</body>
</html>
